# koa-utils custom security rules — consolidated final set
#
# Environment constraints (do not re-derive):
#  - Semgrep 1.169.0 cannot select .mts files as targets. This file is run against a shadow
#    tree (scratchpad/shadow) that mirrors src/**/*.mts as **/*.ts with byte-identical
#    content, so line numbers map 1:1 onto the real src/ tree; only the extension differs.
#  - Semgrep OSS taint mode is INTRA-FILE ONLY. A pattern-source in one file and a
#    pattern-sink in another file will NOT be linked, even when the real data flow crosses
#    files (see koa-utils.redis-injection.key-injection notes below for a known instance
#    of this exact limitation in this codebase).
#  - Refinement of the above, measured rather than assumed: within a single file, taint
#    DOES survive a helper hop on the value path (`const p = build(name)` still reports),
#    but does NOT flow INTO a callee that contains the sink (`readIt('/d/' + name)` where
#    readIt holds the fs call is silent). See scripts/semgrep-canaries/known-gap/
#    path-traversal-sink-in-callee.ts.
#  - Every rule below was independently re-run against the real 180-file shadow tree as
#    part of adversarial verification; see per-rule "status" metadata for the outcome.
#
# Canary suite — `yarn semgrep:canary` (scripts/semgrep-canaries/):
#   The per-rule "status" strings below assert things about real code and about synthetic
#   canaries. Those canary claims used to be prose only, with no artifact behind them, so
#   they could not be re-checked after a rule edit or a Semgrep upgrade. They are now
#   backed by committed fixtures in three buckets: must-fire (vulnerable, must report),
#   must-not-fire (safe, must stay silent), and known-gap (vulnerable but currently
#   invisible — asserted silent as a tripwire, so coverage improvements are noticed
#   instead of quietly widening the "0 findings" claim). Run it after ANY edit here:
#   a narrowed or typo'd rule reports 0 findings exactly like a clean codebase does.

rules:
  # --- NoSQL injection (Mongoose) ---------------------------------------------------
  # STATUS: fires on 0 real lines today. Kept as a regression guard: the sink category
  # (Mongoose findOne/find/update*/delete*/countDocuments filters) genuinely exists all
  # over this codebase, every current filter uses fixed literal keys, and a synthetic
  # canary confirms the rule still fires on the vulnerable shapes it targets
  # (scripts/semgrep-canaries/must-fire/nosql-*.ts).
  - id: koa-utils.nosql-injection.dynamic-filter-key
    languages: [typescript]
    severity: ERROR
    message: >
      A Mongoose query/update filter is built with a computed (bracket) property key
      ([$KEY]: ...). If $KEY's name is derived from user-controlled input, an attacker
      can inject a Mongo operator (e.g. "$where", "$gt", "$ne", "$regex") as the field
      name itself, bypassing the intended filter/authorization logic entirely. Only the
      *value* side of a Mongo filter should ever be attacker-controlled; the key must be
      a fixed literal. Fix: replace the computed key with an explicit, literal field name.
    patterns:
      - pattern-either:
          - pattern: '$MODEL.findOne({ ..., [$KEY]: $VAL, ... }, ...)'
          - pattern: '$MODEL.findOneAndUpdate({ ..., [$KEY]: $VAL, ... }, ...)'
          - pattern: '$MODEL.findOneAndDelete({ ..., [$KEY]: $VAL, ... }, ...)'
          - pattern: '$MODEL.find({ ..., [$KEY]: $VAL, ... }, ...)'
          - pattern: '$MODEL.updateOne({ ..., [$KEY]: $VAL, ... }, ...)'
          - pattern: '$MODEL.updateMany({ ..., [$KEY]: $VAL, ... }, ...)'
          - pattern: '$MODEL.deleteOne({ ..., [$KEY]: $VAL, ... }, ...)'
          - pattern: '$MODEL.deleteMany({ ..., [$KEY]: $VAL, ... }, ...)'
          - pattern: '$MODEL.countDocuments({ ..., [$KEY]: $VAL, ... }, ...)'
          # Same filter, built in a local first. The inline-object-literal patterns above
          # only match at the call site, so `const f = {[k]: v}; findOne(f)` — an equally
          # exploitable shape and arguably the more natural way to write it — was invisible.
          # $F is bound in the declaration and re-used at the call, so only the variable
          # actually built with a computed key matches.
          - patterns:
              - pattern-inside: |
                  const $F = { ..., [$KEY]: $VAL, ... }
                  ...
              - pattern-either:
                  - pattern: '$MODEL.findOne($F, ...)'
                  - pattern: '$MODEL.find($F, ...)'
                  - pattern: '$MODEL.findOneAndUpdate($F, ...)'
                  - pattern: '$MODEL.findOneAndDelete($F, ...)'
                  - pattern: '$MODEL.updateOne($F, ...)'
                  - pattern: '$MODEL.updateMany($F, ...)'
                  - pattern: '$MODEL.deleteOne($F, ...)'
                  - pattern: '$MODEL.deleteMany($F, ...)'
                  - pattern: '$MODEL.countDocuments($F, ...)'
    paths:
      exclude:
        - "**/*.spec.ts"
        - "**/*.test.ts"
    metadata:
      category: security
      confidence: MEDIUM
      status: regression-guard (0 findings on real code; detection proven by `yarn semgrep:canary`)
      cwe: 'CWE-943: Improper Neutralization of Special Elements in Data Query Logic'
      references:
        - https://www.mongodb.com/docs/manual/faq/security/#how-can-i-prevent-injection-attacks-in-mongodb-

  - id: koa-utils.nosql-injection.object-spread-filter
    languages: [typescript]
    severity: ERROR
    message: >
      A Mongoose query/update filter object is built via object spread (...$SPREAD)
      instead of listing fixed field names. If $SPREAD (or any part of it) originates
      from client input (request body, GraphQL args, query string), an attacker can add
      arbitrary keys to the filter, including Mongo operators, achieving NoSQL operator
      injection / auth bypass. Fix: destructure only the specific fields you intend to
      filter on and assign them to fixed, literal keys instead of spreading.
    patterns:
      - pattern-either:
          - pattern: '$MODEL.findOne({ ...$SPREAD }, ...)'
          - pattern: '$MODEL.find({ ...$SPREAD }, ...)'
          - pattern: '$MODEL.updateOne({ ...$SPREAD }, ...)'
          - pattern: '$MODEL.updateMany({ ...$SPREAD }, ...)'
          - pattern: '$MODEL.deleteOne({ ...$SPREAD }, ...)'
          - pattern: '$MODEL.deleteMany({ ...$SPREAD }, ...)'
          - pattern: '$MODEL.countDocuments({ ...$SPREAD }, ...)'
          # Spread filter built in a local first — see the equivalent note on
          # koa-utils.nosql-injection.dynamic-filter-key.
          - patterns:
              - pattern-inside: |
                  const $F = { ...$SPREAD }
                  ...
              - pattern-either:
                  - pattern: '$MODEL.findOne($F, ...)'
                  - pattern: '$MODEL.find($F, ...)'
                  - pattern: '$MODEL.updateOne($F, ...)'
                  - pattern: '$MODEL.updateMany($F, ...)'
                  - pattern: '$MODEL.deleteOne($F, ...)'
                  - pattern: '$MODEL.deleteMany($F, ...)'
                  - pattern: '$MODEL.countDocuments($F, ...)'
    paths:
      exclude:
        - "**/*.spec.ts"
        - "**/*.test.ts"
    metadata:
      category: security
      confidence: MEDIUM
      status: regression-guard (0 findings on real code; detection proven by `yarn semgrep:canary`)
      cwe: 'CWE-943: Improper Neutralization of Special Elements in Data Query Logic'
      references:
        - https://www.mongodb.com/docs/manual/faq/security/#how-can-i-prevent-injection-attacks-in-mongodb-

  - id: koa-utils.nosql-injection.where-operator
    languages: [typescript]
    severity: WARNING
    message: >
      Mongo query uses the "$where" operator, which executes arbitrary JavaScript
      server-side against every document. This is dangerous by design (performance/DoS
      risk, plus injection risk if any part of the expression is built from user input)
      and is disabled/restricted on many Mongo deployments. Fix: replace with an
      equivalent structured query operator (e.g. $expr with aggregation operators, or a
      plain field comparison) instead of $where.
    patterns:
      - pattern-either:
          - pattern: '$MODEL.findOne({ ..., $where: $EXPR, ... }, ...)'
          - pattern: '$MODEL.find({ ..., $where: $EXPR, ... }, ...)'
          - pattern: '$MODEL.updateOne({ ..., $where: $EXPR, ... }, ...)'
          - pattern: '$MODEL.updateMany({ ..., $where: $EXPR, ... }, ...)'
          - pattern: '$MODEL.deleteOne({ ..., $where: $EXPR, ... }, ...)'
          - pattern: '$MODEL.deleteMany({ ..., $where: $EXPR, ... }, ...)'
          - pattern: '$MODEL.countDocuments({ ..., $where: $EXPR, ... }, ...)'
    paths:
      exclude:
        - "**/*.spec.ts"
        - "**/*.test.ts"
    metadata:
      category: security
      confidence: MEDIUM
      status: regression-guard (0 findings on real code; detection proven by `yarn semgrep:canary`)
      cwe: 'CWE-943: Improper Neutralization of Special Elements in Data Query Logic'
      references:
        - https://www.mongodb.com/docs/manual/faq/security/#how-can-i-prevent-injection-attacks-in-mongodb-

  # --- NoSQL mass assignment (update document) --------------------------------------
  # STATUS: fires on 0 real lines today. Closes a gap the three rules above did NOT cover:
  # they all inspect only the FILTER argument, so an attacker-controlled *update document*
  # — the classic mass-assignment shape, e.g. injecting role/isAdmin/account.email.valid —
  # was entirely outside the ruleset despite the rule family being named for NoSQL injection.
  # Every real update site in this codebase builds its document as a typed object with fixed
  # literal keys (see updateLoginStats4ever.mts:15-28, updatePasswordDb.mts:9), so neither
  # shape below matches current code. Deliberately does NOT flag `{ $set: someVariable }`:
  # that is the dominant safe idiom here and matching it would be noise, not signal.
  - id: koa-utils.nosql-injection.mass-assignment-update-doc
    languages: [typescript]
    severity: ERROR
    message: >
      A Mongoose update document is built with a spread (...$SPREAD) or a computed property
      key ([$KEY]: ...) instead of fixed literal field names. If the spread object or the key
      name derives from client input (request body, GraphQL args), an attacker controls WHICH
      fields get written, not just their values — the classic mass-assignment escalation
      (setting role/isAdmin/verified on your own record), and with a computed key they can
      also inject an update operator. Fix: destructure only the specific fields this mutation
      is allowed to change and assign them to explicit, literal keys.
    patterns:
      - pattern-either:
          # replacement-style update document built by spreading
          - pattern: '$MODEL.updateOne($FILTER, { ...$SPREAD }, ...)'
          - pattern: '$MODEL.updateMany($FILTER, { ...$SPREAD }, ...)'
          - pattern: '$MODEL.replaceOne($FILTER, { ...$SPREAD }, ...)'
          - pattern: '$MODEL.findOneAndUpdate($FILTER, { ...$SPREAD }, ...)'
          - pattern: '$MODEL.findByIdAndUpdate($FILTER, { ...$SPREAD }, ...)'
          # spread nested inside an update operator
          - pattern: '$MODEL.updateOne($FILTER, { ..., $set: { ...$SPREAD }, ... }, ...)'
          - pattern: '$MODEL.updateMany($FILTER, { ..., $set: { ...$SPREAD }, ... }, ...)'
          - pattern: '$MODEL.findOneAndUpdate($FILTER, { ..., $set: { ...$SPREAD }, ... }, ...)'
          - pattern: '$MODEL.findByIdAndUpdate($FILTER, { ..., $set: { ...$SPREAD }, ... }, ...)'
          - pattern: '$MODEL.updateOne($FILTER, { ..., $setOnInsert: { ...$SPREAD }, ... }, ...)'
          # computed (bracket) key in the update document
          - pattern: '$MODEL.updateOne($FILTER, { ..., [$KEY]: $VAL, ... }, ...)'
          - pattern: '$MODEL.updateMany($FILTER, { ..., [$KEY]: $VAL, ... }, ...)'
          - pattern: '$MODEL.findOneAndUpdate($FILTER, { ..., [$KEY]: $VAL, ... }, ...)'
          - pattern: '$MODEL.findByIdAndUpdate($FILTER, { ..., [$KEY]: $VAL, ... }, ...)'
          # computed key nested inside an update operator
          - pattern: '$MODEL.updateOne($FILTER, { ..., $set: { ..., [$KEY]: $VAL, ... }, ... }, ...)'
          - pattern: '$MODEL.updateMany($FILTER, { ..., $set: { ..., [$KEY]: $VAL, ... }, ... }, ...)'
          - pattern: '$MODEL.findOneAndUpdate($FILTER, { ..., $set: { ..., [$KEY]: $VAL, ... }, ... }, ...)'
    paths:
      exclude:
        - "**/*.spec.ts"
        - "**/*.test.ts"
    metadata:
      category: security
      confidence: MEDIUM
      status: regression-guard (0 findings on real code; verified via scripts/semgrep-canaries)
      cwe: 'CWE-915: Improperly Controlled Modification of Dynamically-Determined Object Attributes'
      references:
        - https://www.mongodb.com/docs/manual/faq/security/#how-can-i-prevent-injection-attacks-in-mongodb-

  # --- SQL injection (Sequelize raw query) ------------------------------------------
  # STATUS: fires on real code — 1 confirmed finding, 0 false positives.
  - id: koa-utils.sql-injection.raw-query-interpolation
    mode: taint
    severity: ERROR
    message: >
      A dynamically built string — a template literal with interpolated expressions
      (`${...}`) or a plain `'sql' + value` concatenation — flows into sequelize.query()
      as the raw SQL string, and the call has no `replacements` or `bind` option to
      parameterize the values. Any variable embedded that way is spliced directly into
      the SQL text, so if it ever originates from user input this is classic SQL
      injection. Fix: build the query with `replacements` (or `bind`) instead of
      interpolating or concatenating values into the statement.
    languages: [typescript, javascript]
    pattern-sources:
      - pattern: |
          `...${$VAR}...`
      # Plain string concatenation, not just template literals. Broad as a source in
      # isolation, but harmless here: taint mode only reports when a source actually
      # reaches the sink, and the sink is sequelize.query without replacements/bind.
      # An arithmetic `a + b` elsewhere in the codebase can never satisfy that.
      - pattern: $A + $B
    pattern-sinks:
      - patterns:
          - pattern: sequelize.query($SQL, ...)
          - focus-metavariable: $SQL
    pattern-sanitizers:
      - pattern: |
          sequelize.query($SQL, {..., replacements: $R, ...})
      - pattern: |
          sequelize.query($SQL, {..., bind: $R, ...})
    metadata:
      category: security
      confidence: HIGH
      # Was "confirmed live finding: setLastLoginSQL.mts:18" until 2026-07-20. That line is
      # now `sequelize.query(sql, { type, replacements: {...} })` against a non-interpolated
      # single-quoted string, so it matches neither the pattern-source (template literal)
      # nor the sink-without-replacements shape. The claim outlived the code it described;
      # corrected after a live re-run reported 0 findings across all 180 files.
      status: regression-guard (0 findings on real code; verified via scripts/semgrep-canaries)
      cwe: 'CWE-89: Improper Neutralization of Special Elements used in an SQL Command'
      references:
        - https://sequelize.org/docs/v6/core-concepts/raw-queries/

  # --- Redis key injection -----------------------------------------------------------
  # STATUS: both original findings were FIXED by b669ad4 ("fix: logout redis keys, validate
  # token uuid"), which put an isValidUuidV4 format check between the header read and the
  # Redis key on both paths. isValidUuidV4 is registered as a sanitizer below, so the rule
  # is now a regression guard: it should report 0 findings. Note: two further related
  # instances exist but cross a file boundary and are invisible to this rule because
  # Semgrep OSS taint is intra-file only (see header comment):
  #   - authenticatedLogoutHandler/index.mts -> graphQL/schema/mutations/logout.mts:22
  #     (ctx.state.user.refreshToken -> redisClient.del)
  #   - graphQL/schema/mutations/refresh.mts:52 (oldRefresh -> redisClient.del)
  # Both are laundered through ctx.state / a local, so no rule edit makes them visible;
  # the guarantee is that refreshToken is only ever set from verifySignedRefreshToken's
  # return value. Covered as scripts/semgrep-canaries/known-gap/, not by a pattern.
  - id: koa-utils.redis-injection.key-injection
    mode: taint
    severity: WARNING
    message: >
      A value derived from a client-controlled Koa header (Authorization / Cookie) is
      interpolated into a Redis key without first passing through signature verification
      (e.g. verifySignedRefreshToken) or an equivalent allowlist/format check. The
      attacker fully controls the key suffix used against redisClient, which can be used
      to probe or collide with unrelated keys in the same keyspace (${REDIS_KEY} prefix
      is shared across all session data). Fix: verify/derive the key only from a
      signature-checked or server-generated token, never directly from the raw header.
    languages: [typescript]
    # Matched by accessor shape rather than by header name — see the same change in
    # koa-utils.path-traversal.unsanitized-param for why the name allowlist was a gap.
    pattern-sources:
      - pattern: ctx.request.header.$NAME
      - pattern: ctx.request.header?.$NAME
      - pattern: ctx.request.header[$NAME]
      - pattern: ctx.request.header?.[$NAME]
      - pattern: ctx.headers.$NAME
      - pattern: ctx.headers?.$NAME
      - pattern: ctx.headers[$NAME]
      - pattern: ctx.headers?.[$NAME]
      - pattern: ctx.cookies.get(...)
    pattern-sanitizers:
      - pattern: verifySignedRefreshToken(...)
      # A v4-uuid format check locks the client-controlled suffix to the only shape the
      # server ever generates, which is what closes this class. Both call shapes count:
      # the throwing guard in authenticatedResourceHandler, and extractBearerAccessToken
      # in authenticatedLogoutHandler, which returns '' unless prefix AND uuid both pass.
      - pattern: isValidUuidV4(...)
      - pattern: extractBearerAccessToken(...)
      # Semgrep taint is not path-sensitive, so a throwing guard does not clean the
      # variable it checks: `if (!isValidUuidV4(key...)) throw` leaves `key` tainted for
      # the rest of the block. This sanitizer models that shape explicitly. $V is bound
      # in the guard and re-used in the sanitized pattern, so only the variable actually
      # validated is cleared — a sibling variable flowing past the same guard still fires
      # (covered by the guarded / unguarded / guarded-but-different-var fixtures in
      # scripts/semgrep-canaries/).
      - patterns:
          - pattern-inside: |
              if (!isValidUuidV4($V.slice(...))) { throw $E }
              ...
          - pattern: $V
    pattern-sinks:
      - patterns:
          - pattern-either:
              - pattern: redisClient.hGetAll(`...${$TAINT}...`)
              - pattern: redisClient.hGet(`...${$TAINT}...`, ...)
              - pattern: redisClient.hSet(`...${$TAINT}...`, ...)
              - pattern: redisClient.del(`...${$TAINT}...`)
              - pattern: redisClient.expire(`...${$TAINT}...`, ...)
              - pattern: redisClient.get(`...${$TAINT}...`)
              - pattern: redisClient.set(`...${$TAINT}...`, ...)
          - focus-metavariable: $TAINT
    metadata:
      category: security
      confidence: MEDIUM
      status: regression-guard (0 findings on real code; the 2 original findings — authenticatedLogoutHandler/index.mts:69 and authenticatedResourceHandler/index.mts:36 — were fixed by b669ad4)
      subcategory: [taint-analysis]
      cwe: 'CWE-943: Improper Neutralization of Special Elements in Data Query Logic'
      references:
        - https://redis.io/docs/latest/develop/reference/security/

  # --- Path traversal (filesystem sinks) ---------------------------------------------
  # STATUS: reachability-scoped, 0 findings on real code. Previously this rule modeled
  # pattern-sources as "any function parameter" — a library-API-surface model, not an
  # attacker-reachability model: every exported function taking a path string was flagged
  # (7 findings), regardless of whether any caller in this repo ever fed it untrusted data —
  # none did. Sources are now the actual places raw client data enters this codebase: Koa ctx
  # reads (ctx.params/query/body/header), a GraphQL resolver's `args` (scoped to the
  # `resolve($PARENT, args, ...) {...}` shape every mutation in this codebase uses), and the
  # multipart upload's client-supplied filename (scoped to the exact destructuring shape it's
  # consumed with in storeUploadAsTemp.mts). Sinks are unchanged from the original rule. 0
  # findings here means "no reachable, unsanitized flow from a modeled entry point to an fs
  # sink in this repo today" — verified against the real shadow tree plus the fixtures in
  # scripts/semgrep-canaries/, not a suppression and not the old rule gone quiet by
  # narrowing until the noise disappeared. See metadata.accepted-risk for what is knowingly
  # out of scope. Counts deliberately live in the runner's output, not in this comment:
  # a number frozen in prose is exactly the kind of claim that outlives the code it
  # described (see the SQL rule's status, which asserted a live finding for months after
  # the finding was fixed).
  - id: koa-utils.path-traversal.unsanitized-param
    mode: taint
    languages: [typescript]
    severity: ERROR
    message: >-
      A value read from an untrusted entry point (Koa ctx, a GraphQL resolver's `args`, or a
      multipart upload's client-supplied filename) is used to build a filesystem path that is
      then read, written, moved, or deleted, without going through a recognised sanitizer
      first. Fix: validate/sanitize the value (path.basename(), path.extname(),
      assertNoTraversal(), or an explicit '..' strip) before using it in a filesystem path.
    pattern-sources:
      - pattern: ctx.params
      - pattern: ctx.params.$KEY
      - pattern: ctx.request.query
      - pattern: ctx.query
      - pattern: ctx.request.body
      # Headers are matched by ACCESSOR SHAPE, not by an allowlist of header names.
      # The previous model enumerated the literal names 'authorization' and 'cookie',
      # so any other header was a different pattern and silently unmodelled — even
      # though authenticatedResourceHandler/index.mts:58 already reads
      # ctx.request.header?.['x-introspectioncode'] with this exact shape.
      - pattern: ctx.request.header.$NAME
      - pattern: ctx.request.header?.$NAME
      - pattern: ctx.request.header[$NAME]
      - pattern: ctx.request.header?.[$NAME]
      - pattern: ctx.headers.$NAME
      - pattern: ctx.headers?.$NAME
      - pattern: ctx.headers[$NAME]
      - pattern: ctx.headers?.[$NAME]
      # Koa's idiomatic cookie API, used in src/koa/middleware/debug/index.mts:10.
      - pattern: ctx.cookies.get(...)
      - patterns:
          - pattern-either:
              - pattern-inside: |
                  async resolve($PARENT, args, ...) { ... }
              - pattern-inside: |
                  resolve($PARENT, args, ...) { ... }
          - pattern: args
      - patterns:
          - pattern-inside: |
              const { ..., filename, ... } = await $UPLOAD
              ...
          - pattern: filename
    pattern-sanitizers:
      - pattern: path.basename(...)
      - pattern: path.extname(...)
      - pattern: $X.replace(/\.\./g, ...)
      # assertNoTraversal is a throwing guard, not a reassignment, so a bare
      # `pattern: assertNoTraversal(...)` only clears the call expression itself, not
      # later uses of the checked variable (confirmed by live probe). Use the same
      # pattern-inside idiom already used for isValidUuidV4 in
      # koa-utils.redis-injection.key-injection: $V is bound in the guard and re-used
      # in the sanitized pattern, so only the variable actually validated is cleared.
      - patterns:
          - pattern-inside: |
              assertNoTraversal($V, ...)
              ...
          - pattern: $V
    pattern-sinks:
      - pattern: fs.move($SRC, $SINK, ...)
      - pattern: fs.move($SINK, $DST, ...)
      - pattern: fs.writeFile($SINK, ...)
      - pattern: fs.readFile($SINK, ...)
      - pattern: fs.remove($SINK)
      - pattern: fs.ensureDir($SINK)
      - pattern: fs.unlink($SINK)
      # Not used in src/ today. Listed so the sink set tracks the fs-extra API rather
      # than only the calls that happen to exist now — an unlisted sink is a silent
      # gap, and the cost of listing an unused one is zero.
      - pattern: fs.copy($SRC, $SINK, ...)
      - pattern: fs.copy($SINK, $DST, ...)
      - pattern: fs.rename($SRC, $SINK, ...)
      - pattern: fs.rename($SINK, $DST, ...)
      - pattern: fs.appendFile($SINK, ...)
      - pattern: fs.outputFile($SINK, ...)
      - pattern: fs.rm($SINK, ...)
      - pattern: fs.readdir($SINK, ...)
      # Both the bare import and the namespaced form. Only the bare form was listed,
      # so `fs.createWriteStream(p)` — with fs-extra already imported as `fs` in four
      # files here — was invisible while `createWriteStream(p)` was caught.
      - pattern: createWriteStream($SINK)
      - pattern: createReadStream($SINK)
      - pattern: fs.createWriteStream($SINK)
      - pattern: fs.createReadStream($SINK)
      - pattern: unlink($SINK, ...)
      # This package's OWN path-taking wrappers, treated as sinks in their own right.
      # Semgrep OSS taint does not follow a value INTO a callee that holds the fs call
      # (measured across four call shapes — sync/arrow/hoisted/direct — all silent), so
      # `const p = ctx.params.x; await moveTempFile(p, ...)` was invisible even though
      # both halves live in this repo. Naming the wrappers restores coverage for the
      # flow that actually matters here: untrusted input reaching a file operation
      # through one of our own helpers. Does NOT make the general case visible — see
      # known-gap/path-traversal-sink-in-callee.ts for an arbitrary local helper.
      - pattern: moveTempFile($SINK, ...)
      - pattern: moveTempFile($SRC, $SINK, ...)
      - pattern: moveTempFile($SRC, $DST, $SINK, ...)
      - pattern: reEncode($SINK, ...)
      - pattern: storeUploadAsTemp($SINK, ...)
      - pattern: validateMimeType($SINK, ...)
      - pattern: validateJpgPngExtension($SINK, ...)
      - pattern: validateJpgPngExtension($NAME, $SINK, ...)
      - pattern: validatePdfExtension($SINK, ...)
      - pattern: validatePdfExtension($NAME, $SINK, ...)
    metadata:
      category: security
      confidence: HIGH
      subcategory: [taint-analysis, reachability-scoped]
      status: >-
        reachability-scoped (0 findings on the real shadow tree; supersedes the prior "any
        function parameter" source model, which produced 7 permanently-accepted findings with
        no attacker-reachability signal). Sources are matched by accessor shape — ctx reads
        including any header name and ctx.cookies.get, a GraphQL resolver's args, and the
        multipart upload filename — not by an allowlist of names. Detection and
        false-positive behaviour are proven on every run by `yarn semgrep:canary`
        (scripts/semgrep-canaries/), which is the authority for what currently fires; this
        field deliberately carries no counts.
      accepted-risk: >-
        The library's own exported functions (moveTempFile, validateJpgPngExtension,
        validateMimeType, validatePdfExtension, reEncode, storeUploadAsTemp) are not
        sources merely for taking a string parameter — that model produced 7 findings with
        no attacker-reachability signal. They ARE sinks: a ctx/args value reaching one of
        them inside a single file is reported. What remains out of reach is misuse of this
        public API by a *consumer* package, which no static analysis of this repo can see
        by construction. The runtime guard for that boundary is assertNoTraversal on the
        segment params; the rest is documented as caller responsibility.
        Semgrep OSS taint is intra-file only (see file header), so two shapes stay
        invisible regardless of rule content: a flow crossing a file boundary, and a flow
        into an arbitrary local helper that holds the fs call (naming our own wrappers as
        sinks covers the ones we ship, not a helper written tomorrow). A future regression
        weakening storeUploadAsTemp.mts's sanitization and passing the value to a
        *different file's* fs call would not be caught here.
      cwe: 'CWE-22: Improper Limitation of a Pathname to a Restricted Directory'
      references:
        - https://owasp.org/www-community/attacks/Path_Traversal

  # --- Open redirect -------------------------------------------------------------------
  # STATUS: fires on 0 real lines today (the one call site in the codebase,
  # koa/router/verifyEmail.mts, gates ctx.redirect behind a regex-test sanitizer idiom
  # this rule recognizes). Kept as a regression guard: the sink (ctx.redirect) and
  # sanitizer idiom both genuinely exist in this codebase, and the canary suite confirms the
  # rule still discriminates unguarded from guarded redirects. Note the discrimination is
  # syntactic: any if-guard using .test()/.startsWith()/=== counts as a sanitizer regardless
  # of whether the regex or prefix actually blocks a protocol-relative '//evil.com' target.
  # Guard STRENGTH is a unit-test responsibility, not something this rule can verify.
  - id: koa-utils.open-redirect.unvalidated
    mode: taint
    severity: ERROR
    message: >-
      User-controlled value flows into ctx.redirect() without a validated allowlist
      check first. If an attacker can control this value they can redirect victims to
      an attacker-controlled origin (open redirect), which is commonly chained into
      phishing / OAuth token theft. Fix: validate the target against a strict
      same-origin pattern (e.g. a regex anchored to a known internal path prefix)
      before calling ctx.redirect.
    languages: [typescript, javascript]
    metadata:
      category: security
      confidence: MEDIUM
      status: regression-guard (0 findings on real code; detection proven by `yarn semgrep:canary`)
      subcategory: [open-redirect]
      cwe: "CWE-601: URL Redirection to Untrusted Site ('Open Redirect')"
      owasp: "A01:2021 - Broken Access Control"
    pattern-sources:
      - patterns:
          - pattern-either:
              - pattern: ctx.params
              - pattern: ctx.request.query
              - pattern: ctx.query
              - pattern: ctx.request.body
              # A redirect target taken from a header or cookie is fully attacker
              # controlled; this rule previously had no header/cookie source at all.
              - pattern: ctx.request.header.$NAME
              - pattern: ctx.request.header?.$NAME
              - pattern: ctx.request.header?.[$NAME]
              - pattern: ctx.headers.$NAME
              - pattern: ctx.headers?.[$NAME]
              - pattern: ctx.cookies.get(...)
              - pattern: (($E) as Error).message
              - pattern: $E.message
    pattern-sanitizers:
      - patterns:
          - pattern-either:
              - pattern: |
                  if ($RE.test($X)) { ... }
              - pattern: |
                  if ($X.startsWith($PREFIX)) { ... }
              - pattern: |
                  if ($X === $LIT) { ... }
      - pattern-either:
          - pattern: $RE.test($X)
          - pattern: encodeURIComponent($X)
    pattern-sinks:
      - pattern: $CTX.redirect(...)
